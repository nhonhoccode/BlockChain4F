<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Certificate Request Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4 text-primary">Birth Certificate Request Form</h2>
        <p class="lead">Complete this form to request a birth certificate from the Civil Registration Office.</p>

        <form>
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Child Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="child_first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="child_first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="child_middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="child_middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="child_last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="child_last_name" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="date_of_birth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" required>
                        </div>
                        <div class="col-md-6">
                            <label for="place_of_birth" class="form-label">Place of Birth</label>
                            <input type="text" class="form-control" id="place_of_birth" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Gender</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="M" required>
                                    <label class="form-check-label" for="male">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="F">
                                    <label class="form-check-label" for="female">Female</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Parent Information</h5>
                </div>
                <div class="card-body">
                    <h6 class="mb-3">Father's Information</h6>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="father_first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="father_first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="father_middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="father_middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="father_last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="father_last_name" required>
                        </div>
                    </div>

                    <h6 class="mb-3">Mother's Information</h6>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="mother_first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="mother_first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="mother_middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="mother_middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="mother_last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="mother_last_name" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Contact Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="contact_phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="contact_phone" required>
                        </div>
                        <div class="col-md-6">
                            <label for="contact_email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="contact_email">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="contact_address" class="form-label">Current Address</label>
                        <textarea class="form-control" id="contact_address" rows="3" required></textarea>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Required Documents</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="hospital_certificate" class="form-label">Hospital Certificate</label>
                        <input class="form-control" type="file" id="hospital_certificate" required>
                    </div>

                    <div class="mb-3">
                        <label for="id_documents" class="form-label">Parent ID Documents</label>
                        <input class="form-control" type="file" id="id_documents" multiple required>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="declaration" required>
                    <label class="form-check-label" for="declaration">
                        I declare that the information provided is true and accurate to the best of my knowledge.
                    </label>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">Submit Request</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
