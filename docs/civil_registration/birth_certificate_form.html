<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Certificate Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4 text-primary">Birth Certificate Application Form</h2>
        <p class="lead">Complete this form to apply for a copy of a birth certificate.</p>

        <form>
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Child's Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="date_of_birth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" required>
                        </div>
                        <div class="col-md-6">
                            <label for="place_of_birth" class="form-label">Place of Birth</label>
                            <input type="text" class="form-control" id="place_of_birth" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-select" id="gender" required>
                                <option value="" selected disabled>Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="birth_order" class="form-label">Birth Order</label>
                            <input type="number" class="form-control" id="birth_order" min="1" placeholder="e.g., 1st born, 2nd born, etc.">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="birth_registration_number" class="form-label">Birth Registration Number (if known)</label>
                            <input type="text" class="form-control" id="birth_registration_number">
                        </div>
                        <div class="col-md-6">
                            <label for="nationality" class="form-label">Nationality</label>
                            <input type="text" class="form-control" id="nationality" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Father's Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="father_first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="father_first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="father_middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="father_middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="father_last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="father_last_name" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="father_nationality" class="form-label">Nationality</label>
                            <input type="text" class="form-control" id="father_nationality" required>
                        </div>
                        <div class="col-md-6">
                            <label for="father_religion" class="form-label">Religion</label>
                            <input type="text" class="form-control" id="father_religion">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="father_occupation" class="form-label">Occupation</label>
                            <input type="text" class="form-control" id="father_occupation">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Mother's Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="mother_first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="mother_first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="mother_middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="mother_middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="mother_last_name" class="form-label">Last Name (Maiden)</label>
                            <input type="text" class="form-control" id="mother_last_name" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="mother_nationality" class="form-label">Nationality</label>
                            <input type="text" class="form-control" id="mother_nationality" required>
                        </div>
                        <div class="col-md-6">
                            <label for="mother_religion" class="form-label">Religion</label>
                            <input type="text" class="form-control" id="mother_religion">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="mother_occupation" class="form-label">Occupation</label>
                            <input type="text" class="form-control" id="mother_occupation">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Requestor Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="requestor_type" class="form-label">Relationship to Child</label>
                            <select class="form-select" id="requestor_type" required>
                                <option value="" selected disabled>Select relationship</option>
                                <option value="self">Self (Adult)</option>
                                <option value="parent">Parent</option>
                                <option value="guardian">Legal Guardian</option>
                                <option value="spouse">Spouse</option>
                                <option value="child">Child</option>
                                <option value="sibling">Sibling</option>
                                <option value="grandparent">Grandparent</option>
                                <option value="authorized">Authorized Representative</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="requestor_first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="requestor_first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="requestor_middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="requestor_middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="requestor_last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="requestor_last_name" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="requestor_phone" class="form-label">Contact Number</label>
                            <input type="tel" class="form-control" id="requestor_phone" required>
                        </div>
                        <div class="col-md-6">
                            <label for="requestor_email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="requestor_email">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="requestor_address" class="form-label">Current Address</label>
                            <textarea class="form-control" id="requestor_address" rows="3" required></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Purpose of Request</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="purpose" class="form-label">Purpose of Certificate</label>
                            <select class="form-select" id="purpose" required>
                                <option value="" selected disabled>Select purpose</option>
                                <option value="passport">Passport Application</option>
                                <option value="school">School Requirement</option>
                                <option value="employment">Employment</option>
                                <option value="travel">Travel</option>
                                <option value="legal">Legal Purposes</option>
                                <option value="claim">Claim/Benefit</option>
                                <option value="id">ID Application</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="other_purpose" class="form-label">Other Purpose (please specify)</label>
                            <input type="text" class="form-control" id="other_purpose">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="num_copies" class="form-label">Number of Copies</label>
                            <input type="number" class="form-control" id="num_copies" min="1" value="1" required>
                        </div>
                        <div class="col-md-6">
                            <label for="certificate_type" class="form-label">Certificate Type</label>
                            <select class="form-select" id="certificate_type" required>
                                <option value="regular">Regular Copy</option>
                                <option value="authenticated">Authenticated Copy</option>
                                <option value="international">International Use (Apostille/Authentication)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Supporting Documents</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="requestor_id" class="form-label">Requestor's Valid ID</label>
                        <input class="form-control" type="file" id="requestor_id" required>
                    </div>

                    <div class="mb-3">
                        <label for="authorization" class="form-label">Authorization Letter (if applicable)</label>
                        <input class="form-control" type="file" id="authorization">
                    </div>

                    <div class="mb-3">
                        <label for="supporting_documents" class="form-label">Additional Supporting Documents</label>
                        <input class="form-control" type="file" id="supporting_documents" multiple>
                        <div class="form-text">Upload any other relevant documents to support your application</div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="declaration" required>
                    <label class="form-check-label" for="declaration">
                        I declare that the information provided is true and accurate to the best of my knowledge. I understand that providing false information may result in legal consequences.
                    </label>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Show/hide other purpose field based on purpose selection
        document.getElementById('purpose').addEventListener('change', function() {
            const otherPurposeField = document.getElementById('other_purpose');
            if (this.value === 'other') {
                otherPurposeField.required = true;
                otherPurposeField.parentElement.parentElement.style.display = 'flex';
            } else {
                otherPurposeField.required = false;
                otherPurposeField.parentElement.parentElement.style.display = 'none';
            }
        });

        // Initialize the form
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('purpose').dispatchEvent(new Event('change'));
        });
    </script>
</body>
</html>
