<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4 text-primary">General Application Form</h2>
        <p class="lead">Complete this form to submit a general service request to the commune administration.</p>

        <form>
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Applicant Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="date_of_birth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" required>
                        </div>
                        <div class="col-md-6">
                            <label for="id_number" class="form-label">ID/Passport Number</label>
                            <input type="text" class="form-control" id="id_number" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="address" class="form-label">Current Address</label>
                            <textarea class="form-control" id="address" rows="3" required></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Request Details</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="request_category" class="form-label">Request Category</label>
                            <select class="form-select" id="request_category" required>
                                <option value="" selected disabled>Select category</option>
                                <option value="utility">Utility Services</option>
                                <option value="public_works">Public Works</option>
                                <option value="transport">Transportation</option>
                                <option value="events">Community Events</option>
                                <option value="complaint">General Complaint</option>
                                <option value="other">Other Services</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="urgency" class="form-label">Urgency Level</label>
                            <select class="form-select" id="urgency" required>
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="emergency">Emergency</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="request_title" class="form-label">Request Title</label>
                            <input type="text" class="form-control" id="request_title" placeholder="Brief title of your request" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="request_description" class="form-label">Detailed Description</label>
                            <textarea class="form-control" id="request_description" rows="5" placeholder="Please provide a detailed description of your request" required></textarea>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="location" class="form-label">Location (if applicable)</label>
                            <input type="text" class="form-control" id="location" placeholder="Address or location related to this request">
                        </div>
                        <div class="col-md-6">
                            <label for="preferred_date" class="form-label">Preferred Resolution Date (if applicable)</label>
                            <input type="date" class="form-control" id="preferred_date">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Contact Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="preferred_contact" class="form-label">Preferred Contact Method</label>
                            <select class="form-select" id="preferred_contact" required>
                                <option value="phone">Phone</option>
                                <option value="email">Email</option>
                                <option value="mail">Mail</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Supporting Documents</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="id_documents" class="form-label">ID/Passport Copy</label>
                        <input class="form-control" type="file" id="id_documents" required>
                    </div>

                    <div class="mb-3">
                        <label for="supporting_documents" class="form-label">Additional Supporting Documents</label>
                        <input class="form-control" type="file" id="supporting_documents" multiple>
                        <div class="form-text">Please upload any additional documents that support your request (photos, previous correspondence, etc.)</div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="declaration" required>
                    <label class="form-check-label" for="declaration">
                        I declare that the information provided is true and accurate to the best of my knowledge.
                    </label>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">Submit Request</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
