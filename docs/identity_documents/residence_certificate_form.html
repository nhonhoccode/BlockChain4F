<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residence Certificate Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4 text-primary">Residence Certificate Application Form</h2>
        <p class="lead">Complete this form to apply for a certificate of residence.</p>

        <form>
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Personal Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="date_of_birth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" required>
                        </div>
                        <div class="col-md-6">
                            <label for="place_of_birth" class="form-label">Place of Birth</label>
                            <input type="text" class="form-control" id="place_of_birth" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="nationality" class="form-label">Nationality</label>
                            <input type="text" class="form-control" id="nationality" required>
                        </div>
                        <div class="col-md-6">
                            <label for="civil_status" class="form-label">Civil Status</label>
                            <select class="form-select" id="civil_status" required>
                                <option value="" selected disabled>Select status</option>
                                <option value="single">Single</option>
                                <option value="married">Married</option>
                                <option value="divorced">Divorced</option>
                                <option value="widowed">Widowed</option>
                                <option value="separated">Separated</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-select" id="gender" required>
                                <option value="" selected disabled>Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="occupation" class="form-label">Occupation</label>
                            <input type="text" class="form-control" id="occupation">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="id_number" class="form-label">National ID/Passport Number</label>
                            <input type="text" class="form-control" id="id_number" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Residence Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="current_address" class="form-label">Current Residential Address</label>
                            <textarea class="form-control" id="current_address" rows="3" required></textarea>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="district" class="form-label">District</label>
                            <input type="text" class="form-control" id="district" required>
                        </div>
                        <div class="col-md-4">
                            <label for="city" class="form-label">City/Municipality</label>
                            <input type="text" class="form-control" id="city" required>
                        </div>
                        <div class="col-md-4">
                            <label for="province" class="form-label">Province/State</label>
                            <input type="text" class="form-control" id="province" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="postal_code" class="form-label">Postal Code</label>
                            <input type="text" class="form-control" id="postal_code" required>
                        </div>
                        <div class="col-md-8">
                            <label for="residence_duration" class="form-label">Duration of Residence</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="residence_duration" min="1" required>
                                <select class="form-select" id="duration_unit">
                                    <option value="months">Month(s)</option>
                                    <option value="years">Year(s)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="previous_address" class="form-label">Previous Address (if current residence is less than 6 months)</label>
                            <textarea class="form-control" id="previous_address" rows="2"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Certificate Purpose</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="purpose" class="form-label">Purpose of Certificate</label>
                            <select class="form-select" id="purpose" required>
                                <option value="" selected disabled>Select purpose</option>
                                <option value="employment">Employment Requirements</option>
                                <option value="school">School/University Admission</option>
                                <option value="bank">Bank Account Opening</option>
                                <option value="travel">Travel/Visa Application</option>
                                <option value="id">ID Card Application</option>
                                <option value="benefits">Government Benefits</option>
                                <option value="business">Business Registration</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="other_purpose" class="form-label">Other Purpose (please specify)</label>
                            <input type="text" class="form-control" id="other_purpose">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Contact Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="emergency_contact" class="form-label">Emergency Contact Name</label>
                            <input type="text" class="form-control" id="emergency_contact">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="emergency_relation" class="form-label">Relationship</label>
                            <input type="text" class="form-control" id="emergency_relation">
                        </div>
                        <div class="col-md-6">
                            <label for="emergency_phone" class="form-label">Emergency Contact Phone</label>
                            <input type="tel" class="form-control" id="emergency_phone">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Supporting Documents</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="id_proof" class="form-label">Proof of Identity (ID Card/Passport)</label>
                        <input class="form-control" type="file" id="id_proof" required>
                    </div>

                    <div class="mb-3">
                        <label for="address_proof" class="form-label">Proof of Address (Utility Bill/Lease Agreement)</label>
                        <input class="form-control" type="file" id="address_proof" required>
                    </div>

                    <div class="mb-3">
                        <label for="photo" class="form-label">Recent Passport-sized Photo</label>
                        <input class="form-control" type="file" id="photo" required>
                    </div>

                    <div class="mb-3">
                        <label for="additional_documents" class="form-label">Additional Supporting Documents</label>
                        <input class="form-control" type="file" id="additional_documents" multiple>
                        <div class="form-text">Please upload any other relevant documents as required</div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="declaration" required>
                    <label class="form-check-label" for="declaration">
                        I declare that the information provided is true and accurate to the best of my knowledge. I understand that providing false information may result in legal consequences.
                    </label>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
