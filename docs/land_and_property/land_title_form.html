<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Title Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4 text-primary">Land Title Application Form</h2>
        <p class="lead">Complete this form to apply for a new land title or transfer of ownership.</p>

        <form>
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Applicant Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" required>
                        </div>
                        <div class="col-md-4">
                            <label for="middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="middle_name">
                        </div>
                        <div class="col-md-4">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="date_of_birth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" required>
                        </div>
                        <div class="col-md-6">
                            <label for="id_number" class="form-label">ID/Passport Number</label>
                            <input type="text" class="form-control" id="id_number" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="address" class="form-label">Current Address</label>
                            <textarea class="form-control" id="address" rows="3" required></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Property Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="application_type" class="form-label">Application Type</label>
                            <select class="form-select" id="application_type" required>
                                <option value="" selected disabled>Select type</option>
                                <option value="new">New Land Title</option>
                                <option value="transfer">Transfer of Ownership</option>
                                <option value="subdivision">Subdivision of Land</option>
                                <option value="consolidation">Consolidation of Titles</option>
                                <option value="correction">Correction of Title</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="property_type" class="form-label">Property Type</label>
                            <select class="form-select" id="property_type" required>
                                <option value="residential">Residential</option>
                                <option value="commercial">Commercial</option>
                                <option value="agricultural">Agricultural</option>
                                <option value="industrial">Industrial</option>
                                <option value="mixed">Mixed Use</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="property_address" class="form-label">Property Address</label>
                            <textarea class="form-control" id="property_address" rows="3" required></textarea>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="lot_number" class="form-label">Lot Number</label>
                            <input type="text" class="form-control" id="lot_number" required>
                        </div>
                        <div class="col-md-4">
                            <label for="block_number" class="form-label">Block Number</label>
                            <input type="text" class="form-control" id="block_number">
                        </div>
                        <div class="col-md-4">
                            <label for="survey_number" class="form-label">Survey Number</label>
                            <input type="text" class="form-control" id="survey_number" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="land_area" class="form-label">Land Area (sq.m.)</label>
                            <input type="number" step="0.01" class="form-control" id="land_area" required>
                        </div>
                        <div class="col-md-6">
                            <label for="assessed_value" class="form-label">Assessed Value</label>
                            <input type="number" step="0.01" class="form-control" id="assessed_value" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Ownership Details</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="ownership_type" class="form-label">Type of Ownership</label>
                            <select class="form-select" id="ownership_type" required>
                                <option value="sole">Sole Ownership</option>
                                <option value="joint">Joint Ownership</option>
                                <option value="corporate">Corporate Ownership</option>
                                <option value="trust">Trust Ownership</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="acquisition_date" class="form-label">Date of Acquisition</label>
                            <input type="date" class="form-control" id="acquisition_date" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="previous_owner" class="form-label">Previous Owner's Name (if transfer)</label>
                            <input type="text" class="form-control" id="previous_owner">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="acquisition_details" class="form-label">Means of Acquisition</label>
                            <select class="form-select" id="acquisition_details" required>
                                <option value="purchase">Purchase</option>
                                <option value="inheritance">Inheritance</option>
                                <option value="donation">Donation</option>
                                <option value="exchange">Exchange</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Supporting Documents</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="id_documents" class="form-label">ID/Passport Copy</label>
                        <input class="form-control" type="file" id="id_documents" required>
                    </div>

                    <div class="mb-3">
                        <label for="deed_of_sale" class="form-label">Deed of Sale/Transfer/Donation</label>
                        <input class="form-control" type="file" id="deed_of_sale" required>
                    </div>

                    <div class="mb-3">
                        <label for="tax_declaration" class="form-label">Tax Declaration</label>
                        <input class="form-control" type="file" id="tax_declaration" required>
                    </div>

                    <div class="mb-3">
                        <label for="survey_plan" class="form-label">Technical Description/Survey Plan</label>
                        <input class="form-control" type="file" id="survey_plan" required>
                    </div>

                    <div class="mb-3">
                        <label for="additional_documents" class="form-label">Additional Supporting Documents</label>
                        <input class="form-control" type="file" id="additional_documents" multiple>
                        <div class="form-text">Please upload any other relevant documents (power of attorney, court order, etc.)</div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Contact Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12">
                            <label for="preferred_contact" class="form-label">Preferred Contact Method</label>
                            <select class="form-select" id="preferred_contact" required>
                                <option value="phone">Phone</option>
                                <option value="email">Email</option>
                                <option value="mail">Mail</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="declaration" required>
                    <label class="form-check-label" for="declaration">
                        I declare that the information provided is true and accurate to the best of my knowledge.
                    </label>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
